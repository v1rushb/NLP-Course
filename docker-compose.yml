services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ppu}
      POSTGRES_USER: ${POSTGRES_USER:-ppu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ppu_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ppu} -d ${POSTGRES_DB:-ppu}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ppu:ppu_password@db:5432/ppu}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-86400}
      SEED_DEV_DATA: ${SEED_DEV_DATA:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-Administrator}
      ADMIN_STUDENT_ID: ${ADMIN_STUDENT_ID:-}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_MODE: ${OPENAI_API_MODE:-responses}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-45}
      AI_MAX_RETRIES: ${AI_MAX_RETRIES:-2}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-}
      AI_FALLBACK_PROVIDER: ${AI_FALLBACK_PROVIDER:-}
      AI_AUTO_FALLBACK: ${AI_AUTO_FALLBACK:-true}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_ALLOW_DEV_OTP: ${EMAIL_ALLOW_DEV_OTP:-false}
      OTP_SECRET: ${OTP_SECRET:-}
      GRADE_OTP_TTL_SECONDS: ${GRADE_OTP_TTL_SECONDS:-300}
      PPU_DATA_DIR: ${PPU_DATA_DIR:-/app/Data}
      PPU_KNOWLEDGE_AUTO_INDEX: ${PPU_KNOWLEDGE_AUTO_INDEX:-true}
      PPU_KNOWLEDGE_SYNC_INTERVAL_SECONDS: ${PPU_KNOWLEDGE_SYNC_INTERVAL_SECONDS:-300}
      PPU_KNOWLEDGE_MAX_RESULTS: ${PPU_KNOWLEDGE_MAX_RESULTS:-5}
      PPU_KNOWLEDGE_MIN_SCORE: ${PPU_KNOWLEDGE_MIN_SCORE:-2.0}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    volumes:
      - ./Data:/app/Data:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
      VITE_PPU_API: ${VITE_PPU_API:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    depends_on:
      - backend

volumes:
  postgres_data:
